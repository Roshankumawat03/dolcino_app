<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dolcino - Exquisite Food Blog{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="description" content="Discover exquisite recipes and culinary inspiration">
</head>
<body>
    <header id="header">
        <nav>
            <a href="/" class="logo">
                <i class="fas fa-utensils"></i> Dolcino
            </a>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="#featured">Recipes</a></li>
                <li><a href="#newsletter">Subscribe</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    {% block content %}{% endblock %}

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3><i class="fas fa-heart"></i> Dolcino</h3>
                <p>Where culinary artistry meets everyday dining. Explore recipes that inspire and delight.</p>
                <div class="social-links">
                    <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <a href="/">All Recipes</a>
                <a href="#">Desserts</a>
                <a href="#">Main Courses</a>
                <a href="#">About</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 Dolcino Food Blog. Made with ❤️ for food lovers.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
